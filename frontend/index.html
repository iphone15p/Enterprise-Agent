<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客科技 - 企业级 AI 运营中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        .markdown-body p { margin-bottom: 0.6em; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.2em; margin-bottom: 0.6em; }
        .markdown-body strong { color: #60A5FA; font-weight: bold; }
        .typing-indicator::after { content: '▋'; animation: blink 1s step-start infinite; color: #60A5FA; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen flex overflow-hidden">

    <aside class="w-64 bg-gray-950 border-r border-gray-800 flex flex-col justify-between flex-shrink-0">
        <div class="p-3 flex flex-col gap-4 overflow-hidden h-full">
            <button onclick="createNewSession()" class="w-full border border-gray-700 hover:border-blue-500 hover:bg-gray-900 text-sm font-medium py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                <span>+</span> New Session
            </button>
            <div class="flex-1 overflow-y-auto flex flex-col gap-1 pr-1" id="session-list"></div>
        </div>
        <div class="p-4 border-t border-gray-800 bg-gray-950/50 text-xs text-gray-500 text-center">GeekTech AI Core</div>
    </aside>

    <section class="flex-1 flex flex-col justify-between bg-gray-900 relative">
        <header class="bg-gray-900/80 backdrop-blur-md border-b border-gray-800 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-xl">🤖</div>
                <div>
                    <h1 class="text-base font-bold tracking-wide" id="current-title">GeekTech AI Core Hub</h1>
                    <p class="text-xs text-gray-400">Multi-Agent System — Planner → Researcher → Coder → Reviewer</p>
                </div>
            </div>
            <div class="text-xs text-blue-400 bg-blue-400/10 border border-blue-400/20 px-3 py-1 rounded-full flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Online
            </div>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col gap-6 w-full max-w-4xl mx-auto scroll-smooth"></main>

        <footer class="p-4 bg-gradient-to-t from-gray-900 via-gray-900 to-transparent">
            <div class="max-w-4xl mx-auto flex gap-3">
                <input type="text" id="user-input" class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-5 py-4 text-gray-100 text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30 transition-all placeholder-gray-500" placeholder="Ask anything..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-4 rounded-xl font-bold text-sm tracking-wider transition-all active:scale-95 flex items-center shadow-lg shadow-blue-600/20">Send</button>
            </div>
        </footer>
    </section>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionListContainer = document.getElementById('session-list');

        let currentThreadId = "";
        let sessions = JSON.parse(localStorage.getItem('ai_sessions')) || [];
        let htmlRenderCache = {};
        let typewriterTimer = null;

        const AUTH_TOKEN = "demo_token";

        window.onload = function() {
            if (sessions.length === 0) { createNewSession(); }
            else { currentThreadId = sessions[0].id; renderSessionList(); loadChatHistoryFromServer(currentThreadId); }
        };

        function createNewSession() {
            if (typewriterTimer) clearInterval(typewriterTimer);
            const id = "thread_" + Math.random().toString(36).substring(2, 9);
            const newSession = { id: id, title: "New Chat " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            sessions.unshift(newSession);
            saveSessions();
            currentThreadId = id;
            renderSessionList();
            clearChatWindow();
            showWelcomeMessage();
        }

        function renderSessionList() {
            sessionListContainer.innerHTML = "";
            sessions.forEach(s => {
                const isActive = s.id === currentThreadId;
                const btn = document.createElement('button');
                btn.id = `session-btn-${s.id}`;
                btn.className = `w-full text-left text-sm py-3 px-4 rounded-xl flex items-center justify-between transition-all group ${isActive ? 'bg-gray-800 text-blue-400 font-medium border border-gray-700' : 'text-gray-400 hover:bg-gray-900/50 hover:text-gray-200'}`;
                btn.innerHTML = `
                    <div class="flex items-center gap-2 truncate flex-1" onclick="switchSession('${s.id}')">
                        <span>💬</span> <span class="truncate">${s.title}</span>
                    </div>
                    <span onclick="deleteSession('${s.id}', event)" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-red-400 px-1 transition-all">&times;</span>
                `;
                sessionListContainer.appendChild(btn);
            });
        }

        function switchSession(id) {
            if (id === currentThreadId) return;
            if (typewriterTimer) clearInterval(typewriterTimer);
            currentThreadId = id;
            document.querySelectorAll('#session-list button').forEach(b => b.className = "w-full text-left text-sm py-3 px-4 rounded-xl flex items-center justify-between transition-all group text-gray-400 hover:bg-gray-900/50 hover:text-gray-200");
            const activeBtn = document.getElementById(`session-btn-${id}`);
            if (activeBtn) activeBtn.className = "w-full text-left text-sm py-3 px-4 rounded-xl flex items-center justify-between transition-all group bg-gray-800 text-blue-400 font-medium border border-gray-700";
            const session = sessions.find(s => s.id === id);
            document.getElementById('current-title').innerText = session ? session.title : "GeekTech AI Core Hub";
            loadChatHistoryFromServer(id);
        }

        function deleteSession(id, event) {
            event.stopPropagation();
            if (typewriterTimer) clearInterval(typewriterTimer);
            sessions = sessions.filter(s => s.id !== id);
            delete htmlRenderCache[id];
            saveSessions();
            if (id === currentThreadId) {
                if (sessions.length > 0) { currentThreadId = sessions[0].id; loadChatHistoryFromServer(currentThreadId); }
                else { createNewSession(); }
            }
            renderSessionList();
        }

        async function loadChatHistoryFromServer(id) {
            if (htmlRenderCache[id]) {
                chatContainer.innerHTML = htmlRenderCache[id];
                scrollToBottom();
                return;
            }
            clearChatWindow();
            showLoadingIndicator();
            try {
                const response = await fetch(`/get_chat_history?thread_id=${id}`);
                const data = await response.json();
                clearChatWindow();
                if (data.history && data.history.length > 0) {
                    let htmlBuffer = "";
                    data.history.forEach(msg => {
                        if (msg.role === "user") {
                            htmlBuffer += `<div class="flex gap-4 flex-row-reverse"><div class="w-9 h-9 rounded-lg bg-indigo-500 flex-shrink-0 flex items-center justify-center text-sm shadow-md">U</div><div class="bg-indigo-600 p-4 rounded-xl rounded-tr-none text-sm text-white max-w-[75%] break-words shadow-sm">${msg.content}</div></div>`;
                        } else {
                            htmlBuffer += `<div class="flex gap-4"><div class="w-9 h-9 rounded-lg bg-blue-600 flex-shrink-0 flex items-center justify-center text-sm shadow-md">AI</div><div class="bg-gray-800 p-4 rounded-xl rounded-tl-none border border-gray-800 text-sm text-gray-200 max-w-[85%] w-full shadow-sm"><div class="markdown-body">${DOMPurify.sanitize(marked.parse(msg.content))}</div></div></div>`;
                        }
                    });
                    chatContainer.innerHTML = htmlBuffer;
                    htmlRenderCache[id] = htmlBuffer;
                    scrollToBottom();
                } else { showWelcomeMessage(); }
            } catch (error) {
                chatContainer.innerHTML = `<div class="text-center text-red-400 text-sm py-8">Failed to load history</div>`;
            }
        }

        function startStreamingTypewriter(element, fullText, targetSessionId) {
            if (typewriterTimer) clearInterval(typewriterTimer);
            let charIndex = 0;
            element.classList.add('typing-indicator');
            typewriterTimer = setInterval(() => {
                if (targetSessionId !== currentThreadId) {
                    clearInterval(typewriterTimer);
                    return;
                }
                if (charIndex <= fullText.length) {
                    const textSlice = fullText.substring(0, charIndex);
                    element.innerHTML = DOMPurify.sanitize(marked.parse(textSlice));
                    scrollToBottom();
                    charIndex += 3;
                } else {
                    clearInterval(typewriterTimer);
                    element.classList.remove('typing-indicator');
                    htmlRenderCache[currentThreadId] = chatContainer.innerHTML;
                }
            }, 15);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const currentSession = sessions.find(s => s.id === currentThreadId);
            if (currentSession && currentSession.title.startsWith("New Chat")) {
                currentSession.title = text.length > 15 ? text.substring(0, 15) + "..." : text;
                saveSessions();
                renderSessionList();
                if (currentThreadId === currentSession.id) document.getElementById('current-title').innerText = currentSession.title;
            }

            appendUserMessage(text);
            htmlRenderCache[currentThreadId] = chatContainer.innerHTML;
            userInput.value = '';
            setUIState(true);

            const contentBox = createAIMessageContainer();
            contentBox.innerHTML = "";

            try {
                const response = await fetch('/run_agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task: text,
                        token: AUTH_TOKEN,
                        thread_id: currentThreadId
                    })
                });

                if (!response.ok) {
                    contentBox.innerHTML = `Error: ${response.status} ${response.statusText}`;
                    setUIState(false);
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.substring(6);
                            if (dataStr === '[DONE]') {
                                setUIState(false);
                                return;
                            }
                            try {
                                const data = JSON.parse(dataStr);
                                for (const nodeName in data) {
                                    if (data[nodeName].research_info) {
                                        startStreamingTypewriter(contentBox, data[nodeName].research_info, currentThreadId);
                                    }
                                }
                            } catch (e) { /* partial chunk, ignore */ }
                        }
                    }
                }
                setUIState(false);
            } catch (error) {
                contentBox.innerHTML = "Connection error.";
                setUIState(false);
            }
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex gap-4 flex-row-reverse';
            div.innerHTML = `<div class="w-9 h-9 rounded-lg bg-indigo-500 flex-shrink-0 flex items-center justify-center text-sm shadow-md">U</div><div class="bg-indigo-600 p-4 rounded-xl rounded-tr-none text-sm text-white max-w-[75%] break-words shadow-sm">${text}</div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function createAIMessageContainer() {
            const div = document.createElement('div');
            div.className = 'flex gap-4';
            div.innerHTML = `<div class="w-9 h-9 rounded-lg bg-blue-600 flex-shrink-0 flex items-center justify-center text-sm shadow-md">AI</div><div class="bg-gray-800 p-4 rounded-xl rounded-tl-none border border-gray-800 text-sm text-gray-200 max-w-[85%] w-full shadow-sm"><div class="markdown-body typing-indicator">Thinking...</div></div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div.querySelector('.markdown-body');
        }

        function saveSessions() { localStorage.setItem('ai_sessions', JSON.stringify(sessions)); }
        function clearChatWindow() { chatContainer.innerHTML = ""; }
        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        function showLoadingIndicator() { chatContainer.innerHTML = `<div class="text-center text-gray-500 text-sm py-8 typing-indicator">Loading history...</div>`; }
        function showWelcomeMessage() { chatContainer.innerHTML = `<div class="flex gap-4"><div class="w-9 h-9 rounded-lg bg-blue-600 flex-shrink-0 flex items-center justify-center text-sm">AI</div><div class="bg-gray-800 p-4 rounded-xl rounded-tl-none border border-gray-800 text-sm text-gray-200 shadow-sm">Welcome to GeekTech AI Core. Multi-Agent System ready. Send your request to begin.</div></div>`; }
        function setUIState(disabled) {
            userInput.disabled = disabled;
            sendBtn.disabled = disabled;
            if(disabled) sendBtn.classList.add('opacity-50', 'cursor-not-allowed');
            else { sendBtn.classList.remove('opacity-50', 'cursor-not-allowed'); userInput.focus(); }
        }
    </script>
</body>
</html>
