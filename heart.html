<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
        }
        .heart {
            position: relative;
            width: 100px;
            height: 90px;
            transform: rotate(-45deg);
        }
        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #e74c3c;
        }
        .heart::before {
            top: 0;
            left: 50px;
        }
        .heart::after {
            top: 50px;
            left: 0;
        }
        /* 脉动动画 */
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.05); }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .heart {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div class="heart"></div>
</body>
</html>
