<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级 AI 智能体开发团队</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">🤖 AI 多智能体研发中心</h1>
        <p class="text-center text-gray-500 mb-8">FastAPI + LangGraph 流式输出终极版</p>

        <div class="flex gap-4 mb-6">
            <input type="text" id="taskInput" value="写一个输出 Hello World 的 Python 脚本"
                   class="flex-1 border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-blue-500 text-lg">
            <button onclick="startAgent()" id="runBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200">
                🚀 启动 AI 团队
            </button>
        </div>

        <div id="outputArea" class="bg-gray-900 rounded-lg p-4 h-96 overflow-y-auto space-y-4">
            <div class="text-gray-400 text-sm text-center">系统待命中... 等待下发任务</div>
        </div>
    </div>

    <script>
        function startAgent() {
            const task = document.getElementById('taskInput').value;
            const outputArea = document.getElementById('outputArea');
            const runBtn = document.getElementById('runBtn');

            // 1. 清空屏幕，按钮变灰
            outputArea.innerHTML = '';
            runBtn.disabled = true;
            runBtn.innerText = "⏳ 团队运行中...";

            // 2. 最核心的一句代码：用 EventSource 连接你的 FastAPI 后端！
            // 注意：这里连的就是你刚才浏览器里裸测的那个地址！
            const url = `http://127.0.0.1:8000/run_agent?task=${encodeURIComponent(task)}`;
            const eventSource = new EventSource(url);

            // 3. 监听后端吐出来的 "data:"
            eventSource.onmessage = function(event) {
                // 如果后端吐出了 "[DONE]"，说明彻底结束了
                if (event.data === "[DONE]") {
                    eventSource.close(); // 挂断电话
                    runBtn.disabled = false;
                    runBtn.innerText = "🚀 启动 AI 团队";

                    // 加上一句成功提示
                    const successHtml = `<div class="p-3 bg-green-900/50 border border-green-500 text-green-400 rounded-md">🎉 任务彻底完成！代码已保存到后端本地！</div>`;
                    outputArea.innerHTML += successHtml;
                    outputArea.scrollTop = outputArea.scrollHeight;
                    return;
                }

                // 4. 把那堆奇怪的 JSON 乱码，翻译成对象
                try {
                    const dataObj = JSON.parse(event.data);

                    // 遍历 AI 的每一个状态，画到屏幕上
                    for (const [nodeName, stateUpdate] of Object.entries(dataObj)) {
                        let contentHtml = `<div class="mb-2 font-bold text-blue-400">✅ [${nodeName}] 汇报状态：</div>`;

                        for (const [key, value] of Object.entries(stateUpdate)) {
                            // 如果是代码，就用专门的代码框显示
                            if (key === "code") {
                                contentHtml += `<div class="mt-2 text-xs text-gray-400">生成的代码:</div>
                                                <pre class="bg-black p-3 rounded text-green-400 text-sm overflow-x-auto my-2"><code>${value}</code></pre>`;
                            } else {
                                // 否则当做普通文字显示
                                contentHtml += `<div class="text-gray-200 text-sm ml-4 mb-1"><b>${key}:</b> ${value}</div>`;
                            }
                        }

                        // 包装成一个气泡，塞进屏幕里
                        const bubble = `<div class="bg-gray-800 border border-gray-700 rounded-lg p-3  border-l-4 border-l-blue-500">${contentHtml}</div>`;
                        outputArea.innerHTML += bubble;

                        // 让屏幕永远滚动到最底下
                        outputArea.scrollTop = outputArea.scrollHeight;
                    }
                } catch (e) {
                    console.error("解析乱码失败啦：", e);
                }
            };

            // 5. 如果报错了（比如后端没开，或者跨域被拦截了）
            eventSource.onerror = function() {
                eventSource.close();
                runBtn.disabled = false;
                runBtn.innerText = "🚀 启动 AI 团队";
                outputArea.innerHTML += `<div class="text-red-500 font-bold p-2 bg-red-900/30 rounded">❌ 连接后端失败！请检查 FastAPI 是否在运行，或者跨域配置是否正确。</div>`;
            };
        }
    </script>
</body>
</html>
